<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>Portofolio | Sukamager</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap");

        :root {
            --blue: rgb(50, 132, 255);
            --blue-glow: rgba(50, 132, 255, 0.5);
            --blue-soft: rgba(50, 132, 255, 0.12);
        }

        * {
            padding: 0;
            margin: 0;
            font-family: "Poppins", sans-serif;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-image: url("./img/background.jpg");
            background-size: cover;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* ===== PILL NAV ===== */
        .pill-nav {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            padding: 6px;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
            max-width: calc(100vw - 24px);
            overflow-x: auto;
            scrollbar-width: none;
            z-index: 1000;
            transition: box-shadow 0.3s ease;
        }

        .pill-nav:hover {
            box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 20px rgba(50,132,255,0.12);
        }

        .pill-nav::-webkit-scrollbar { display: none; }

        .pill-nav a {
            padding: 10px 18px;
            border-radius: 999px;
            text-decoration: none;
            color: #bbb;
            font-size: 14px;
            white-space: nowrap;
            transition: color 0.25s ease, background 0.25s ease, transform 0.2s ease;
        }

        .pill-nav a:hover { color: #fff; transform: translateY(-1px); }
        .pill-nav a.active { background: rgba(255,255,255,0.15); color: #fff; }

        @media (max-width: 480px) {
            .pill-nav { top: 10px; padding: 4px; gap: 2px; }
            .pill-nav a { padding: 6px 10px; font-size: 12px; }
        }

        /* ===== CONTACT CONTAINER ===== */
        .contact-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 7rem 2rem 3rem;
        }

        .contact-content {
            width: 85%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 3rem;
            color: white;
        }

        /* ===== LEFT — INFO ===== */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .contact-header h1 {
            font-size: 2.2rem;
            color: var(--blue);
            text-shadow: 0 0 20px var(--blue-glow);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .contact-header .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
            border-radius: 999px;
            margin: 0.6rem 0 1rem;
            animation: pulse-line 2.5s ease-in-out infinite;
        }

        @keyframes pulse-line {
            0%, 100% { width: 60px; opacity: 0.7; }
            50%       { width: 110px; opacity: 1; }
        }

        .contact-header p {
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ===== CONTACT ITEMS ===== */
        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background: rgba(10,20,40,0.55);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(50,132,255,0.2);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            transition:
                transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.4s ease,
                border-color 0.3s ease;
            cursor: default;
        }

        .contact-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--blue);
            border-radius: 999px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .contact-item:hover {
            transform: translateX(6px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.4), 0 0 16px rgba(50,132,255,0.15);
            border-color: rgba(50,132,255,0.5);
        }

        .contact-item:hover::before { opacity: 1; }

        .contact-icon {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
            background: var(--blue-soft);
            border: 1px solid rgba(50,132,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .contact-item:hover .contact-icon {
            background: rgba(50,132,255,0.25);
            box-shadow: 0 0 14px var(--blue-glow);
            transform: scale(1.1) rotate(-5deg);
        }

        .contact-icon i {
            font-size: 1.2rem;
            color: var(--blue);
        }

        .contact-text h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .contact-text p {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 500;
        }

        /* ===== SOCIAL LINKS ===== */
        .social-links {
            display: flex;
            gap: 12px;
        }

        .social-links a {
            width: 42px;
            height: 42px;
            background: var(--blue-soft);
            border: 1px solid rgba(50,132,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--blue);
            text-decoration: none;
            font-size: 1rem;
            transition:
                transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.3s ease,
                box-shadow 0.3s ease,
                color 0.3s ease;
        }

        .social-links a:hover {
            transform: scale(1.25) translateY(-4px);
            background: var(--blue);
            color: #000;
            box-shadow: 0 0 0 5px var(--blue-soft), 0 0 18px var(--blue-glow);
        }

        /* Instagram */
        .social-links a:nth-child(1):hover { background: #e1306c; color: #fff; border-color: #e1306c; box-shadow: 0 0 18px rgba(225,48,108,0.5); }
        /* GitHub */
        .social-links a:nth-child(2):hover { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 18px rgba(255,255,255,0.35); }
        /* TikTok */
        .social-links a:nth-child(3):hover { background: #000; color: #fff; border-color: #fff; box-shadow: 0 0 18px rgba(255,255,255,0.2); }
        /* X */
        .social-links a:nth-child(4):hover { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 18px rgba(255,255,255,0.35); }

        /* ===== RIGHT — FORM ===== */
        .contact-form {
            background: rgba(10, 20, 40, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(50,132,255,0.2);
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.4s ease, border-color 0.3s ease;
        }

        /* Top glow edge */
        .contact-form::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; width: 80%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
            border-radius: 999px;
            opacity: 0.6;
        }

        .contact-form:focus-within {
            box-shadow: 0 0 40px rgba(50,132,255,0.15);
            border-color: rgba(50,132,255,0.45);
        }

        .form-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--blue);
            text-shadow: 0 0 10px var(--blue-glow);
            margin-bottom: 1.8rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        /* ===== FORM GROUP ===== */
        .form-group {
            position: relative;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(50,132,255,0.3);
            border-radius: 12px;
            font-size: 0.95rem;
            color: #fff;
            outline: none;
            transition:
                border-color 0.3s ease,
                background 0.3s ease,
                box-shadow 0.3s ease;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--blue);
            background: rgba(50,132,255,0.07);
            box-shadow: 0 0 0 3px rgba(50,132,255,0.12), 0 4px 16px rgba(0,0,0,0.2);
        }

        .form-group label {
            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            pointer-events: none;
            padding: 0 4px;
        }

        .form-group textarea ~ label {
            top: 18px;
            transform: none;
        }

        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label,
        .form-group textarea:focus + label,
        .form-group textarea:not(:placeholder-shown) + label {
            top: -10px;
            left: 12px;
            font-size: 0.75rem;
            color: var(--blue);
            background: rgba(5,15,35,0.9);
            border-radius: 4px;
            transform: none;
        }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            padding: 13px 2rem;
            background: var(--blue);
            border: 2px solid var(--blue);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition:
                transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.3s ease,
                color 0.3s ease,
                box-shadow 0.3s ease;
            margin-top: 0.4rem;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .submit-btn:hover::before { transform: translateX(100%); }

        .submit-btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: transparent;
            color: var(--blue);
            box-shadow: 0 0 28px var(--blue-glow), 0 6px 20px rgba(0,0,0,0.3);
        }

        .submit-btn:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 884px) {
            .contact-container { padding: 6rem 1.5rem 3rem; }
            .contact-content {
                width: 100%;
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        @media (max-width: 640px) {
            .contact-container { padding: 5.5rem 1rem 2.5rem; }
            .contact-content { width: 100%; }
            .contact-header h1 { font-size: 1.7rem; }
            .contact-header p { font-size: 0.88rem; }
            .contact-form { padding: 1.6rem 1.2rem; }
            .form-title { font-size: 1.1rem; margin-bottom: 1.4rem; }
            .contact-item { padding: 0.8rem 1rem; }
            .contact-icon { width: 40px; height: 40px; }
            .contact-icon i { font-size: 1rem; }
            .contact-text h3 { font-size: 0.78rem; }
            .contact-text p { font-size: 0.88rem; }
            .social-links a { width: 38px; height: 38px; font-size: 0.9rem; }
            .submit-btn { font-size: 0.92rem; padding: 11px 1.5rem; }
        }

        @media (max-width: 380px) {
            .contact-header h1 { font-size: 1.4rem; }
            .contact-form { padding: 1.2rem 1rem; }
        }
    </style>
</head>
