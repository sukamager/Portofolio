    <meta charset="UTF-8">

<style>
@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap");

:root {
  --blue: rgb(50, 132, 255);
  --blue-glow: rgba(50, 132, 255, 0.6);
  --blue-soft: rgba(50, 132, 255, 0.15);
}

* {
  padding: 0;
  margin: 0;
  font-family: "Poppins", sans-serif;
  box-sizing: border-box;
}

body {
  width: 100%;
  min-height: 100vh;
  background-image: url("img/background.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
}

/* ===== PILL NAV ===== */
.pill-nav {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  padding: 6px;
  background: rgba(255, 255, 255, 0.10);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
  max-width: calc(100vw - 24px);
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 1000;
  transition: box-shadow 0.3s ease;
}

.pill-nav:hover {
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.15), 0 0 20px rgba(50,132,255,0.12);
}

.pill-nav::-webkit-scrollbar { display: none; }

.pill-nav a {
  padding: 10px 18px;
  border-radius: 999px;
  text-decoration: none;
  color: #bbb;
  font-size: 14px;
  white-space: nowrap;
  transition: color 0.25s ease, background 0.25s ease, transform 0.2s ease;
  position: relative;
}

.pill-nav a:hover {
  color: #fff;
  transform: translateY(-1px);
}

.pill-nav a.active {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
}

@media (max-width: 480px) {
  .pill-nav { top: 10px; padding: 4px; gap: 2px; }
  .pill-nav a { padding: 6px 10px; font-size: 12px; }
}

/* ===== SECTION ===== */
section {
  width: 100%;
  min-height: 100vh;
  padding-top: 110px;
}

@media (max-width: 480px) {
  section { padding-top: 130px; }
}

/* ===== MAIN CONTAINER ===== */
.main-container {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: space-evenly;
  align-items: center;
}

.main-container .content {
  color: white;
  width: 40%;
  min-height: 100px;
}

.content h1 {
  font-size: clamp(1rem, 1rem + 5vw, 1.8rem);
}

.content h1 span {
  font-weight: 700;
  text-shadow: 0 0 10px var(--blue);
  color: var(--blue);
}

.content .typewriter {
  font-size: clamp(1rem, 1rem + 5vw, 2.5rem);
  font-weight: 700;
}

.typewriter span {
  color: var(--blue);
  text-shadow: 0 0 10px var(--blue);
}

.content p {
  font-size: clamp(0.75rem, 0.2rem + 2vw, 1rem);
  margin: 10px 0;
  line-height: 1.7;
  color: rgba(255,255,255,0.85);
}

/* ===== SOCIAL LINKS ===== */
.social-links {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: nowrap;
  margin-top: 15px;
}

.social-links a {
  text-decoration: none;
  display: inline-flex;
}

.social-links i {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  width: 3rem;
  height: 3rem;
  background-color: transparent;
  border: 0.2rem solid var(--blue);
  border-radius: 50%;
  color: var(--blue);
  font-size: 1.5rem;
  /* Smooth multi-property transition */
  transition:
    transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
    background-color 0.3s ease,
    color 0.3s ease,
    box-shadow 0.35s ease,
    border-color 0.3s ease;
  position: relative;
  cursor: pointer;
}

.social-links i::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--blue-soft) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.social-links a:hover i {
  transform: scale(1.25) translateY(-4px);
  background-color: var(--blue);
  color: #000;
  border-color: var(--blue);
  box-shadow:
    0 0 0 6px var(--blue-soft),
    0 0 20px var(--blue-glow),
    0 8px 20px rgba(0,0,0,0.4);
}

.social-links a:hover i::after {
  opacity: 1;
}

/* Individual icon color accents on hover */
.social-links a:nth-child(1):hover i { background-color: #e1306c; border-color: #e1306c; box-shadow: 0 0 0 6px rgba(225,48,108,0.2), 0 0 20px rgba(225,48,108,0.6), 0 8px 20px rgba(0,0,0,0.4); }
.social-links a:nth-child(2):hover i { background-color: #fff; border-color: #fff; color: #000; box-shadow: 0 0 0 6px rgba(255,255,255,0.15), 0 0 20px rgba(255,255,255,0.4), 0 8px 20px rgba(0,0,0,0.4); }
.social-links a:nth-child(3):hover i { background-color: #000; border-color: #fff; color: #fff; box-shadow: 0 0 0 6px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,0.3), 0 8px 20px rgba(0,0,0,0.4); }
.social-links a:nth-child(4):hover i { background-color: #fff; border-color: #fff; color: #000; box-shadow: 0 0 0 6px rgba(255,255,255,0.15), 0 0 20px rgba(255,255,255,0.4), 0 8px 20px rgba(0,0,0,0.4); }

/* ===== BUTTON ===== */
.content button {
  width: 50%;
  height: 6vh;
  margin: 30px;
  background-color: var(--blue);
  color: white;
  border: 2px solid var(--blue);
  outline: none;
  font-size: 100%;
  font-weight: 700;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition:
    transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
    color 0.3s ease,
    background-color 0.3s ease,
    box-shadow 0.3s ease;
}

.content button::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}

.content button:hover::before {
  transform: translateX(100%);
}

.content button:hover {
  transform: translateY(-3px) scale(1.03);
  color: var(--blue);
  background-color: transparent;
  box-shadow: 0 0 30px var(--blue-glow), 0 6px 20px rgba(0,0,0,0.3);
}

.content button:active {
  transform: translateY(0px) scale(0.98);
  transition: transform 0.1s ease;
}

/* ===== PROFILE IMAGE ===== */
.main-container .image {
  width: 280px;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  /* Smooth glow ring */
  box-shadow:
    0 0 0 4px rgba(50,132,255,0.3),
    0 0 40px rgba(50,132,255,0.5),
    0 0 80px rgba(50,132,255,0.2);
  transition:
    transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
    box-shadow 0.5s ease;
  cursor: pointer;
}

/* Orbit ring on hover */
.main-container .image::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--blue);
  border-right-color: rgba(50,132,255,0.4);
  opacity: 0;
  transition: opacity 0.3s ease;
  animation: orbit 2s linear infinite;
  animation-play-state: paused;
  z-index: 2;
}

/* Shimmer overlay */
.main-container .image::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%, rgba(50,132,255,0.1) 100%);
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 1;
  pointer-events: none;
}

.main-container .image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.main-container .image:hover {
  transform: scale(1.06) translateY(-6px);
  box-shadow:
    0 0 0 5px rgba(50,132,255,0.5),
    0 0 60px rgba(50,132,255,0.7),
    0 0 100px rgba(50,132,255,0.3),
    0 20px 40px rgba(0,0,0,0.4);
}

.main-container .image:hover::before {
  opacity: 1;
  animation-play-state: running;
}

.main-container .image:hover::after {
  opacity: 1;
}

.main-container .image:hover img {
  transform: scale(1.04);
}

@keyframes orbit {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Idle floating animation */
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-10px); }
}

.main-container .image {
  animation: float 4s ease-in-out infinite;
}

.main-container .image:hover {
  animation: none;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 884px) {
  .main-container {
    display: flex;
    flex-direction: column-reverse;
    gap: 20px;
    padding-bottom: 40px;
  }

  .main-container .content {
    width: 80%;
  }

  .main-container .image {

    width: 50%;
    height: 80%;
  }

  .social-links i {
    width: 2.5rem;
    height: 2.5rem;

@media (max-width: 480px) {

  .main-container .content { width: 80%; }

  .social-links { gap: 8px; justify-content: flex-start; }

  .content button {
    min-width: unset;
    width: auto;
    padding: 8px 14px;
    font-size: 0.85rem;
    margin-top: 14px;
    height: auto;
    margin-left: 0;
  }
}
</style>

<script>
function hamburg(){
    const navbar = document.querySelector(".dropdown")
    navbar.style.transform = "translateY(0px)"
}
function cancel(){
    const navbar = document.querySelector(".dropdown")
    navbar.style.transform = "translateY(-500px)"
}

// Typewriter animation
const texts = [
    "NETWORK ENGINEER",
    "PROGRAMMER",
    "DESIGNER GRAPHIC"
]

let speed = 100;
const textElements = document.querySelector(".typewriter-text")
let textIndex = 0;
let charcterIndex = 0;

function typeWriter() {
    if(charcterIndex < texts[textIndex].length){
        textElements.innerHTML += texts[textIndex].charAt(charcterIndex);
        charcterIndex++;
        setTimeout(typeWriter, speed);
    } else {
        setTimeout(eraseText, 1000)
    }
}

function eraseText() {
    if(textElements.innerHTML.length > 0){
        textElements.innerHTML = textElements.innerHTML.slice(0,-1)
        setTimeout(eraseText, 50)
    } else {
        textIndex = (textIndex + 1) % texts.length;
        charcterIndex = 0;
        setTimeout(typeWriter, 500)
    }
}

window.onload = typeWriter;
</script>
